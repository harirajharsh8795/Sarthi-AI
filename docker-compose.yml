version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: saarthi_backend_dev
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./knowledge_base:/app/knowledge_base
    environment:
      - PORT=8000
      - OLLAMA_HOST=http://host.docker.internal:11434
      - MODEL_NAME=llama3.2:1b
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: saarthi_frontend_dev
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
