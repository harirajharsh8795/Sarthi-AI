name: Incremental RAG Knowledge Base Ingestion

on:
  push:
    paths:
      - 'knowledge_base/**'
  workflow_dispatch:

jobs:
  kb-ingestion:
    name: Incremental Chunking & Embedding Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

      - name: Validate Knowledge Base Syntax & Metadata
        run: |
          python scratch/scan_legal.py || true
          python scratch/scan_common.py || true

      - name: Run Incremental Merge Ingestion Pipeline
        run: |
          python scratch/merge_ingest_pipeline.py
