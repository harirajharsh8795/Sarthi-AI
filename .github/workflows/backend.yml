name: Backend CI & Test Suite

on:
  push:
    branches: [ main, release/* ]
  pull_request:
    branches: [ main ]

jobs:
  backend-ci:
    name: Backend Validation & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8 pytest pytest-cov
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

      - name: Code Formatting & Linting Check
        run: |
          black --check backend/ || true
          isort --check-only backend/ || true
          flake8 backend/ --max-line-length=120 --ignore=E501,W503 || true

      - name: Run Backend Pytest Suite
        run: |
          pytest backend/tests/ --doctest-modules --junitxml=junit/test-results.xml || true
