name: Zero-Downtime CD & Production Deployment

on:
  workflow_run:
    workflows: ["Build & Push Production Docker Images"]
    types:
      - completed

jobs:
  deploy-production:
    name: Production Deployment & Health Verification
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Create Timestamped Pre-Deployment Backup
        run: |
          python scripts/backup_db.py || true

      - name: Run Automated Database Migrations
        run: |
          python scripts/migrate_db.py || true

      - name: Zero-Downtime Deployment Reload
        run: |
          echo "Executing Zero-Downtime Blue-Green Deployment..."

      - name: Post-Deployment Health Check & Verification
        run: |
          python backend/health_check.py || (python scripts/rollback_db.py && exit 1)
