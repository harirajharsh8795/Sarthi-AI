name: Security & Vulnerability Scan

on:
  push:
    branches: [ main, release/* ]
  pull_request:
    branches: [ main ]

jobs:
  security-audit:
    name: Security & Secret Scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Security Tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety flake8

      - name: Run Code Security Scan (Bandit)
        run: |
          bandit -r backend/ -x backend/tests/ --severity-level medium

      - name: Run Dependency Vulnerability Scan (Safety)
        run: |
          safety check --file backend/requirements.txt || true

      - name: Secret Scanning
        run: |
          python backend/secret_scanner.py || true
